name: Daily Students Backup Verify

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  backup-and-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install API dependencies
        run: npm ci

      - name: Export students backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run backup:students

      - name: Verify backup restore dry-run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run backup:verify
